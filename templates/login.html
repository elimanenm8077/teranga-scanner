<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teranga DEV — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04060d; --bg2: #070c18; --bg3: #0a1020;
  --border: #0f2040; --border2: #1a3a6a;
  --acc: #00d4ff; --grn: #00ff88; --red: #ff2244;
  --dim: #2a4a6a; --txt: #7ab8d8; --wht: #e0f0ff;
  --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--txt);
  font-family: var(--mono); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none;
}
.card {
  position: relative; z-index: 1;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 50px 40px; text-align: center;
  width: 100%; max-width: 420px;
}
.logo-icon {
  width: 60px; height: 60px; border: 1.5px solid var(--acc);
  border-radius: 14px; display: flex; align-items: center;
  justify-content: center; background: rgba(0,212,255,0.05);
  margin: 0 auto 20px; font-size: 28px;
}
.title {
  font-family: var(--sans); font-size: 26px; font-weight: 800;
  color: var(--wht); margin-bottom: 6px;
}
.subtitle { color: var(--acc); font-size: 10px; letter-spacing: 3px; margin-bottom: 8px; }
.desc { color: var(--dim); font-size: 12px; margin-bottom: 36px; line-height: 1.7; }
.btn-google {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  width: 100%; padding: 16px; border-radius: 12px;
  background: var(--wht); color: #04060d;
  border: none; cursor: pointer; font-family: var(--mono);
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  transition: all 0.2s; text-decoration: none;
}
.btn-google:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,212,255,0.15); }
.btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }
.footer-txt { margin-top: 24px; color: var(--dim); font-size: 10px; letter-spacing: 1px; }
.error { background: rgba(255,34,68,0.1); border: 1px solid rgba(255,34,68,0.3); color: var(--red); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-icon">⬡</div>
  <div class="title">Teranga DEV</div>
  <div class="subtitle">SECURITY SCANNER v6.3</div>
  <div class="desc">
    Connectez-vous pour accéder au scanner<br>
    de backdoors FiveM — Pays de la Teranga
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <a href="/google_login" class="btn-google">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    CONTINUER AVEC GOOGLE
  </a>
  <div class="footer-txt">TERANGA DEV © 2026 — TARKALLA</div>
</div>
</body>
</html>
